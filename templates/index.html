<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ text.direction }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <div class="language-switch">
            <a href="{{ url_for('home', lang='en') }}" class="{% if lang == 'en' %}active{% endif %}">
                {{ text.language_en }}
            </a>
            <a href="{{ url_for('home', lang='de') }}" class="{% if lang == 'de' %}active{% endif %}">
                {{ text.language_de }}
            </a>
            <a href="{{ url_for('home', lang='ar') }}" class="{% if lang == 'ar' %}active{% endif %}">
                {{ text.language_ar }}
            </a>
        </div>

        <h1>{{ text.heading }}</h1>

        <form action="/predict" method="post" class="prediction-form">
            <input type="hidden" name="lang" value="{{ lang }}">
            
            <!-- Numeric Fields -->
            <div>
                <label for="age">{{ text.age }}</label>
                <input type="number" name="age" id="age" min="29" max="77" required>
            </div>
            
            <div>
                <label for="trestbps">{{ text.trestbps }}</label>
                <input type="number" name="trestbps" id="trestbps" min="94" max="200" required>
            </div>
            
            <div>
                <label for="chol">{{ text.chol }}</label>
                <input type="number" name="chol" id="chol" min="126" max="564" required>
            </div>
            
            <div>
                <label for="thalach">{{ text.thalach }}</label>
                <input type="number" name="thalach" id="thalach" min="71" max="202" required>
            </div>
            
            <div>
                <label for="oldpeak">{{ text.oldpeak }}</label>
                <input type="number" name="oldpeak" id="oldpeak" min="0" max="6.2" step="0.1" required>
            </div>
            
            <div>
                <label for="ca">{{ text.ca }}</label>
                <input type="number" name="ca" id="ca" min="0" max="4" required>
            </div>
            
            <!-- Categorical Fields -->
            <div>
                <label for="sex">{{ text.sex }}</label>
                <select name="sex" id="sex" required>
                    <option value="">{{ text.sex_select }}</option>
                    <option value="1">{{ text.sex_male }}</option>
                    <option value="0">{{ text.sex_female }}</option>
                </select>
            </div>
            
            <div>
                <label for="cp">{{ text.cp }}</label>
                <select name="cp" id="cp" required>
                    <option value="">{{ text.cp_select }}</option>
                    <option value="0">{{ text.cp_typical }}</option>
                    <option value="1">{{ text.cp_atypical }}</option>
                    <option value="2">{{ text.cp_noanginal }}</option>
                    <option value="3">{{ text.cp_asymp }}</option>
                </select>
            </div>
            
            <div>
                <label for="fbs">{{ text.fbs }}</label>
                <select name="fbs" id="fbs" required>
                    <option value="">{{ text.fbs_select }}</option>
                    <option value="1">{{ text.fbs_high }}</option>
                    <option value="0">{{ text.fbs_low }}</option>
                </select>
            </div>
            
            <div>
                <label for="restecg">{{ text.restecg }}</label>
                <select name="restecg" id="restecg" required>
                    <option value="">{{ text.restecg_select }}</option>
                    <option value="0">{{ text.restecg_normal }}</option>
                    <option value="1">{{ text.restecg_stt }}</option>
                    <option value="2">{{ text.restecg_hvh }}</option>
                </select>
            </div>
            
            <div>
                <label for="exang">{{ text.exang }}</label>
                <select name="exang" id="exang" required>
                    <option value="">{{ text.exang_select }}</option>
                    <option value="1">{{ text.exang_yes }}</option>
                    <option value="0">{{ text.exang_no }}</option>
                </select>
            </div>
            
            <div>
                <label for="slope">{{ text.slope }}</label>
                <select name="slope" id="slope" required>
                    <option value="">{{ text.slope_select }}</option>
                    <option value="0">{{ text.slope_up }}</option>
                    <option value="1">{{ text.slope_flat }}</option>
                    <option value="2">{{ text.slope_down }}</option>
                </select>
            </div>
            
            <div>
                <label for="thal">{{ text.thal }}</label>
                <select name="thal" id="thal" required>
                    <option value="">{{ text.thal_select }}</option>
                    <option value="0">{{ text.thal_normal }}</option>
                    <option value="1">{{ text.thal_fixed }}</option>
                    <option value="2">{{ text.thal_reversible }}</option>
                </select>
            </div>
            
            <button type="submit">{{ text.predict_button }}</button>
        </form>

        {% if prediction %}
        <section class="result">
            <div style="margin-top:20px; font-size:20px; font-weight:bold;">
                {{ text.result_label }}: {{ prediction }}
            </div>
            <div style="font-size:18px;">
                {{ text.probability_label }}: {{ probability }} %
            </div>
        </section>
        {% endif %}
    </main>
</body>
</html>
