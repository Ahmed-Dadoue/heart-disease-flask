<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ text.direction }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ text.page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <div class="language-switch">
            <a href="{{ url_for('home', lang='en') }}" class="{% if lang == 'en' %}active{% endif %}">
                {{ text.language_en }}
            </a>
            <a href="{{ url_for('home', lang='de') }}" class="{% if lang == 'de' %}active{% endif %}">
                {{ text.language_de }}
            </a>
            <a href="{{ url_for('home', lang='ar') }}" class="{% if lang == 'ar' %}active{% endif %}">
                {{ text.language_ar }}
            </a>
        </div>

        <h1>{{ text.heading }}</h1>

        <form action="/predict" method="post" class="prediction-form">
            <input type="hidden" name="lang" value="{{ lang }}">
            <label>{{ text.age }} <input type="number" name="age" required></label>
            <label>{{ text.sex }} <input type="number" name="sex" required></label>
            <label>{{ text.cp }} <input type="number" name="cp" required></label>
            <label>{{ text.trestbps }} <input type="number" name="trestbps" required></label>
            <label>{{ text.chol }} <input type="number" name="chol" required></label>
            <label>{{ text.fbs }} <input type="number" name="fbs" required></label>
            <label>{{ text.restecg }} <input type="number" name="restecg" required></label>
            <label>{{ text.thalach }} <input type="number" name="thalach" required></label>
            <label>{{ text.exang }} <input type="number" name="exang" required></label>
            <label>{{ text.oldpeak }} <input type="number" step="any" name="oldpeak" required></label>
            <label>{{ text.slope }} <input type="number" name="slope" required></label>
            <label>{{ text.ca }} <input type="number" name="ca" required></label>
            <label>{{ text.thal }} <input type="number" name="thal" required></label>
            <button type="submit">{{ text.predict_button }}</button>
        </form>

        {% if prediction %}
        <section class="result">
            <div style="margin-top:20px; font-size:20px; font-weight:bold;">
                {{ text.result_label }}: {{ prediction }}
            </div>
            <div style="font-size:18px;">
                {{ text.probability_label }}: {{ probability }} %
            </div>
        </section>
        {% endif %}
    </main>
</body>
</html>
